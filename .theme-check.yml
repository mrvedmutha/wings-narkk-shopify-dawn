# Rules disabled because Dawn's own core files trigger them.
# These are not real errors — they are intentional patterns in Dawn 15.4.1.

# Dawn uses responsive CSS aspect ratios instead of explicit width/height
ImgWidthAndHeight:
  enabled: false

# Dawn sections are long by design
TemplateLength:
  enabled: false

# Dawn references templates that exist only at runtime
MissingTemplate:
  enabled: false

# Dawn uses scheme_classes built up progressively in a loop,
# and uses `continue` as a valid Shopify pagination offset keyword
UndefinedObject:
  enabled: false

# Dawn assigns seo_media and product_settings for JSON-LD/meta use,
# which theme check doesn't recognise as "used"
UnusedAssign:
  enabled: false

# Dawn uses camelCase variable names (anchorId, moduloResult) which
# is valid Liquid but fails theme check's snake_case preference
VariableName:
  enabled: false
